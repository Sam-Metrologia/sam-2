<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Bata de laboratorio -->
  <rect x="10" y="46" width="44" height="20" rx="7" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <!-- Solapa izquierda -->
  <path d="M32 46 L22 52 L18 46Z" fill="white" stroke="#ddd" stroke-width="0.8"/>
  <!-- Solapa derecha -->
  <path d="M32 46 L42 52 L46 46Z" fill="white" stroke="#ddd" stroke-width="0.8"/>
  <!-- Botones bata -->
  <circle cx="32" cy="51" r="1.4" fill="#ccc"/>
  <circle cx="32" cy="56" r="1.4" fill="#ccc"/>

  <!-- Cuello -->
  <rect x="27" y="39" width="10" height="9" rx="3" fill="#f5c5a3"/>

  <!-- Cabeza -->
  <circle cx="32" cy="25" r="18" fill="#f5c5a3"/>

  <!-- Cabello blanco - lados -->
  <path d="M14 20 Q11 9 17 7 Q13 15 16 23Z" fill="white"/>
  <path d="M50 20 Q53 9 47 7 Q51 15 48 23Z" fill="white"/>
  <!-- Mechones superiores blancos -->
  <path d="M18 13 Q25 7 32 8 Q39 7 46 13 Q39 10 32 11 Q25 10 18 13Z" fill="white"/>

  <!-- Orejas -->
  <ellipse cx="14" cy="26" rx="3.5" ry="5" fill="#f5c5a3"/>
  <ellipse cx="50" cy="26" rx="3.5" ry="5" fill="#f5c5a3"/>

  <!-- Gafas — vidrios -->
  <circle cx="25" cy="25" r="7.5" fill="rgba(180,220,255,0.35)" stroke="#444" stroke-width="1.8"/>
  <circle cx="39" cy="25" r="7.5" fill="rgba(180,220,255,0.35)" stroke="#444" stroke-width="1.8"/>
  <!-- Puente gafas -->
  <line x1="32.5" y1="25" x2="31.5" y2="25" stroke="#444" stroke-width="1.8"/>
  <!-- Patillas gafas -->
  <line x1="14" y1="23" x2="17.5" y2="24" stroke="#444" stroke-width="1.5"/>
  <line x1="46.5" y1="24" x2="50" y2="23" stroke="#444" stroke-width="1.5"/>

  <!-- Ojos -->
  <circle cx="25" cy="25" r="2.8" fill="#2d1a0e"/>
  <circle cx="39" cy="25" r="2.8" fill="#2d1a0e"/>
  <!-- Brillo ojos -->
  <circle cx="26" cy="24" r="0.9" fill="white"/>
  <circle cx="40" cy="24" r="0.9" fill="white"/>

  <!-- Cejas canosas pobladas -->
  <path d="M18 18 Q25 15 29 17" fill="none" stroke="#aaa" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M35 17 Q39 15 46 18" fill="none" stroke="#aaa" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Nariz -->
  <path d="M30 29 Q32 33 34 29" fill="none" stroke="#d4906a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Bigote blanco -->
  <path d="M22 35 Q27 39 32 37 Q37 39 42 35" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>

  <!-- Sonrisa -->
  <path d="M26 37 Q32 42 38 37" fill="none" stroke="#b06050" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Lupa (mano derecha) -->
  <circle cx="53" cy="52" r="7.5" fill="rgba(180,220,255,0.4)" stroke="#0A2463" stroke-width="2.2"/>
  <!-- Cruz de calibración dentro de la lupa -->
  <line x1="53" y1="47" x2="53" y2="57" stroke="#0A2463" stroke-width="1" stroke-dasharray="1.5,1"/>
  <line x1="48" y1="52" x2="58" y2="52" stroke="#0A2463" stroke-width="1" stroke-dasharray="1.5,1"/>
  <!-- Mango lupa -->
  <line x1="47" y1="46" x2="40" y2="53" stroke="#0A2463" stroke-width="3" stroke-linecap="round"/>

</svg>
