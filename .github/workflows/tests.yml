name: Tests y Cobertura

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_sam
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 🗑️ Limpiar cache de pytest
        run: |
          rm -f pytest.ini .pytest_cache -rf || true
          echo "Cache limpiado"

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements_test.txt

      - name: 🔍 Verificar instalación
        run: |
          python --version
          pip list | grep pytest
          python manage.py check --deploy

      - name: 🗄️ Esperar PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Esperando PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL listo!"

      - name: 🔍 Verificar tests discovery
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_sam
          DJANGO_SETTINGS_MODULE: proyecto_c.settings
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG_VALUE: 'False'
        run: |
          echo "=== Verificando estructura de tests ==="
          ls -la tests/
          echo ""
          echo "=== Verificando __init__.py en subcarpetas ==="
          find tests/ -name "*.py" -type f | head -20
          echo ""
          echo "=== Verificando pytest puede importar tests (con traceback completo) ==="
          pytest --collect-only -vv --tb=long 2>&1 || echo "ERROR en collection"
          echo ""
          echo "=== Intentando importar conftest directamente ==="
          python -c "import sys; sys.path.insert(0, '.'); from tests import conftest; print('conftest importado OK')" || echo "ERROR importando conftest"
          echo ""
          echo "=== Intentando importar un test directamente ==="
          python -c "import sys; sys.path.insert(0, '.'); from tests.test_models import test_empresa; print('test_empresa importado OK')" || echo "ERROR importando test"

      - name: 🗄️ Verificar migraciones
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_sam
          DJANGO_SETTINGS_MODULE: proyecto_c.settings
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG_VALUE: 'False'
        run: |
          python manage.py migrate --noinput
          python manage.py migrate --check

      - name: 🧪 Ejecutar tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_sam
          DJANGO_SETTINGS_MODULE: proyecto_c.settings
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG_VALUE: 'False'
          PYTHONPATH: .
        run: |
          pytest tests/ \
            --cov=core \
            --cov-report=xml \
            --cov-report=term-missing \
            --verbose \
            --tb=short \
            --maxfail=5 \
            --ds=proyecto_c.settings

      - name: 📊 Subir cobertura a Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-sam
          fail_ci_if_error: false

      - name: 💾 Guardar reporte HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

      - name: 📈 Comentar cobertura en PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true  # No bloquear el CI por problemas de formato

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 📦 Instalar linters
        run: |
          pip install flake8 black isort

      - name: 🔍 Verificar formato con Black
        continue-on-error: true
        run: |
          black --check --diff core/ tests/ || echo "⚠️ Ejecuta 'black core/ tests/' para formatear"

      - name: 🔍 Verificar imports con isort
        continue-on-error: true
        run: |
          isort --check-only --diff core/ tests/ || echo "⚠️ Ejecuta 'isort core/ tests/' para ordenar imports"

      - name: 🔍 Verificar estilo con flake8
        continue-on-error: true
        run: |
          flake8 core/ tests/ --max-line-length=120 --exclude=migrations --ignore=E203,W503 || echo "⚠️ Hay warnings de flake8"

  security:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 🔒 Verificar dependencias con Safety
        run: |
          pip install safety
          safety check --json

      - name: 🔒 Verificar vulnerabilidades con Bandit
        run: |
          pip install bandit
          bandit -r core/ -ll
